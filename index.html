<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB SHARE - Vue.js</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0F172A] via-[#1E293B] to-[#0F172A] flex items-start justify-center p-3 sm:p-4">
    <div id="app" class="w-full max-w-[560px] bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-5 sm:p-6 md:p-8 shadow-2xl">
        <h1 class="text-3xl sm:text-4xl font-bold text-center mb-2 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
            <i class="fas fa-share-alt text-blue-400 mr-2"></i>FB SHARE
        </h1>
        
        <div class="bg-black/20 border border-white/5 rounded-2xl p-4 sm:p-5 mb-4 sm:mb-6">
            <div class="flex items-center gap-2 text-amber-400 font-semibold text-sm sm:text-base mb-3">
                <i class="fas fa-tools"></i> <span>TROUBLESHOOTING</span>
            </div>
            <div class="grid grid-cols-2 gap-2 sm:gap-3">
                <div v-for="tip in tips" :key="tip" class="flex items-center gap-2 text-slate-300 text-xs sm:text-sm">
                    <i class="fas fa-arrow-right text-amber-400 text-xs"></i> <span>{{ tip }}</span>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-slate-300 font-medium text-sm sm:text-base mb-2">
                    <i class="fas fa-link mr-2 text-blue-400"></i>POST URL
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fab fa-facebook"></i>
                    </div>
                    <input 
                        type="url" 
                        v-model="form.url"
                        @keyup.enter="startSharing"
                        class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 transition text-sm sm:text-base" 
                        placeholder="https://facebook.com/..."
                    >
                </div>
            </div>

            <div>
                <label class="block text-slate-300 font-medium text-sm sm:text-base mb-2">
                    <i class="fas fa-cookie-bite mr-2 text-blue-400"></i>COOKIE
                </label>
                <div class="relative">
                    <div class="absolute top-3 left-3 text-gray-400">
                        <i class="fas fa-key"></i>
                    </div>
                    <textarea 
                        v-model="form.cookie" 
                        rows="3" 
                        class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 transition text-sm sm:text-base font-mono" 
                        placeholder="paste your facebook cookie here..."
                    ></textarea>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-slate-300 font-medium text-sm sm:text-base mb-2">
                        <i class="fas fa-chart-bar mr-2 text-blue-400"></i>AMOUNT
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-hashtag"></i>
                        </div>
                        <input 
                            type="number" 
                            v-model.number="form.amount" 
                            min="1"
                            class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 transition text-sm sm:text-base"
                        >
                    </div>
                </div>
                <div>
                    <label class="block text-slate-300 font-medium text-sm sm:text-base mb-2">
                        <i class="fas fa-clock mr-2 text-blue-400"></i>INTERVAL
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-hourglass-half"></i>
                        </div>
                        <input 
                            type="number" 
                            v-model.number="form.interval" 
                            min="0"
                            class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 transition text-sm sm:text-base"
                        >
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-slate-300 font-medium text-sm sm:text-base mb-2">
                    <i class="fas fa-microchip mr-2 text-blue-400"></i>THREADS
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <input 
                        type="number" 
                        v-model.number="form.threads" 
                        min="1"
                        class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 transition text-sm sm:text-base"
                    >
                </div>
            </div>
        </div>

        <button 
            @click="startSharing" 
            :disabled="isProcessing"
            class="w-full mt-6 mb-5 py-4 bg-gradient-to-r from-blue-500 to-purple-500 rounded-xl text-white font-semibold text-base sm:text-lg hover:from-blue-600 hover:to-purple-600 transform hover:-translate-y-0.5 transition shadow-lg shadow-blue-500/30 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 flex items-center justify-center gap-2"
        >
            <i v-if="!isProcessing" class="fas fa-rocket"></i>
            <i v-else class="fas fa-spinner fa-spin"></i>
            <span>{{ isProcessing ? 'PROCESSING' : 'START SHARING' }}</span>
        </button>

        <div class="bg-black/30 border border-white/5 rounded-2xl p-4 sm:p-5">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2 text-slate-400 text-sm sm:text-base">
                    <i class="fas fa-circle text-green-400 text-xs"></i> 
                    <span>LIVE LOGS</span>
                </div>
                <button 
                    @click="clearLogs" 
                    class="relative float-right bg-white/5 border border-white/10 backdrop-blur px-4 py-1.5 rounded-full text-xs text-slate-400 hover:bg-red-500/20 hover:border-red-500/40 hover:text-red-400 transition-all duration-150 shadow-lg flex items-center gap-1"
                    title="clear all logs"
                >
                    <i class="fas fa-eraser"></i> clean
                </button>
            </div>

            <div ref="logsContainer" class="h-48 overflow-y-auto bg-black/20 rounded-xl p-3 mb-4 font-mono text-xs sm:text-sm scroll-smooth">
                <div v-for="(log, index) in logs" :key="index" class="py-1 border-b border-white/5 last:border-0">
                    <i :class="log.icon" class="mr-2"></i>
                    <span :class="log.color">[{{ log.time }}] {{ log.message }}</span>
                </div>
                <div v-if="logs.length === 0" class="text-slate-500 text-center py-4">
                    <i class="fas fa-terminal mr-2"></i> waiting for logs...
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 bg-black/20 rounded-xl p-3">
                <div class="flex flex-col items-center text-center">
                    <div class="flex items-center gap-1 text-slate-400 text-xs sm:text-sm">
                        <i class="fas fa-check-circle text-green-400"></i> 
                        <span>SUCCESS</span>
                    </div>
                    <span class="text-white font-bold text-sm sm:text-base bg-white/5 px-3 py-1 rounded-full w-full text-center flex items-center justify-center gap-1">
                        <i class="fas fa-check text-green-400 text-xs"></i> {{ stats.success }}
                    </span>
                </div>
                <div class="flex flex-col items-center text-center">
                    <div class="flex items-center gap-1 text-slate-400 text-xs sm:text-sm">
                        <i class="fas fa-chart-line text-blue-400"></i> 
                        <span>PROGRESS</span>
                    </div>
                    <span class="text-white font-bold text-sm sm:text-base bg-white/5 px-3 py-1 rounded-full w-full text-center flex items-center justify-center gap-1">
                        <i class="fas fa-spinner fa-pulse text-blue-400 text-xs"></i> {{ stats.progress }}
                    </span>
                </div>
                <div class="flex flex-col items-center text-center">
                    <div class="flex items-center gap-1 text-slate-400 text-xs sm:text-sm">
                        <i class="fas fa-times-circle text-red-400"></i> 
                        <span>ERROR</span>
                    </div>
                    <span class="text-white font-bold text-sm sm:text-base bg-white/5 px-3 py-1 rounded-full w-full text-center flex items-center justify-center gap-1">
                        <i class="fas fa-exclamation-triangle text-red-400 text-xs"></i> {{ stats.error }}
                    </span>
                </div>
            </div>
        </div>

        <p class="text-center text-slate-600 text-xs mt-4">
            <i class="far fa-copyright mr-1"></i>2026 Kenneth Panio. All rights reserved.
        </p>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                tips: [
                    'use facebook lite',
                    'tap 3 dots copy link',
                    'fresh cookie only',
                    'public posts only',
                    'test with 100 first',
                    'avoid private posts'
                ],
                form: {
                    url: 'https://www.facebook.com/nethrion.dev/videos/1443693383468618/?app=fbl',
                    cookie: '',
                    amount: 1000,
                    interval: 0,
                    threads: 1
                },
                isProcessing: false,
                logs: [],
                stats: {
                    success: 0,
                    error: 0,
                    progress: 0
                }
            },
            watch: {
                logs: {
                    handler() {
                        this.$nextTick(() => {
                            const container = this.$refs.logsContainer;
                            if (container) container.scrollTop = container.scrollHeight;
                        });
                    },
                    deep: true
                }
            },
            methods: {
                addLog(message, type = 'info') {
                    const time = new Date().toLocaleTimeString('en-US', { 
                        hour12: false, 
                        hour: '2-digit', 
                        minute: '2-digit', 
                        second: '2-digit' 
                    });
                    
                    const icons = {
                        success: 'fas fa-check-circle text-green-400',
                        error: 'fas fa-times-circle text-red-400',
                        info: 'fas fa-info-circle text-blue-400',
                        warning: 'fas fa-exclamation-triangle text-amber-400'
                    };
                    
                    const colors = {
                        success: 'text-green-400',
                        error: 'text-red-400',
                        info: 'text-blue-400',
                        warning: 'text-amber-400'
                    };
                    
                    this.logs.push({
                        time,
                        message,
                        icon: icons[type] || icons.info,
                        color: colors[type] || colors.info
                    });
                },
                
                clearLogs() {
                    this.logs = [];
                    this.addLog('log area cleaned', 'info');
                },
                
                async startSharing() {
                    if (!this.form.url || !this.form.cookie) {
                        this.addLog('url and cookie required', 'error');
                        return;
                    }

                    this.isProcessing = true;
                    this.logs = [];
                    this.stats = { success: 0, error: 0, progress: 0 };
                    
                    this.addLog(`target: ${this.form.amount} shares`, 'info');
                    this.addLog(`threads: ${this.form.threads} · interval: ${this.form.interval}s`, 'info');

                    try {
                        const response = await fetch('https://oreo.gleeze.com/api/fbshare', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json', 
                                'Accept': 'text/event-stream' 
                            },
                            body: JSON.stringify({
                                postUrl: this.form.url,
                                cookie: this.form.cookie,
                                shareAmount: this.form.amount,
                                intervalSeconds: this.form.interval,
                                threads: this.form.threads,
                                stream: true
                            })
                        });

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';

                        while (true) {
                            const { value, done } = await reader.read();
                            if (done) break;

                            buffer += decoder.decode(value, { stream: true });
                            const messages = buffer.split('\n\n');
                            buffer = messages.pop();

                            for (const message of messages) {
                                const lines = message.split('\n');
                                for (const line of lines) {
                                    if (line.startsWith('data: ')) {
                                        try {
                                            const data = JSON.parse(line.slice(6));
                                            
                                            if (data.status === 'started') {
                                                this.addLog(data.message, 'info');
                                            } else if (data.status === 'progress') {
                                                const match = data.message.match(/(\d+)\/(\d+)/);
                                                if (match) {
                                                    this.stats.progress = parseInt(match[1]);
                                                }
                                            } else if (data.status === 'completed') {
                                                this.stats.success++;
                                                this.addLog(`✓ ${data.message}`, 'success');
                                            } else if (data.status === 'error' || data.status === 'partial_error') {
                                                this.stats.error++;
                                                this.addLog(`✗ ${data.error || data.message}`, 'error');
                                            } else if (data.status === 'expired') {
                                                this.stats.error++;
                                                this.addLog(`⌛ cookie expired`, 'error');
                                            }
                                        } catch (e) {}
                                    }
                                }
                            }
                        }

                        this.addLog('process completed', 'success');

                    } catch (error) {
                        this.addLog(`connection error`, 'error');
                        this.stats.error++;
                    } finally {
                        this.isProcessing = false;
                    }
                }
            }
        });
    </script>
</body>
</html>
